# Hibernate schema creation stays disabled; the initializer creates tables and 2FA columns per tenant
spring.jpa.hibernate.ddl-auto=none

db.name=${DN_NAME}
db.user=${DB_USER}
db.password=${DB_PASSWORD}
db.tenant.public.user=${DB_TENANT_PUBLIC_USER}
db.tenant.public.password=${DB_TENANT_PUBLIC_PASSWORD}
db.tenant.a.user=${DB_TENANT_A_USER}
db.tenant.a.password=${DB_TENANT_A_PASSWORD}
db.tenant.b.user=${DB_TENANT_B_USER}
db.tenant.b.password=${DB_TENANT_B_PASSWORD}