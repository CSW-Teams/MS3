spring.datasource.url=@spring.datasource.url@
spring.datasource.username=sprintfloyd
spring.datasource.password=sprintfloyd
spring.datasource.driverClassName=@spring.datasource.driverClassName@

# Configurazione tenant "public"
tenants-datasources.tenants.public.url=@spring.datasource.url@
tenants-datasources.tenants.public.username=public_scheme_user
tenants-datasources.tenants.public.password=password_public
tenants-datasources.tenants.public.driver=@spring.datasource.driverClassName@

# Configurazione tenant "a"
tenants-datasources.tenants.a.url=@spring.datasource.url@
tenants-datasources.tenants.a.username=tenant_a_user
tenants-datasources.tenants.a.password=password_a
tenants-datasources.tenants.a.driver=@spring.datasource.driverClassName@

# Configurazione tenant "b"
tenants-datasources.tenants.b.url=@spring.datasource.url@
tenants-datasources.tenants.b.username=tenant_b_user
tenants-datasources.tenants.b.password=password_b
tenants-datasources.tenants.b.driver=@spring.datasource.driverClassName@

#logging.level.org.springframework.security=TRACE
audit.persistence.enabled=false

# Schema handled by SchemasInitializer (creates 2FA columns for all tenants);
# keep ddl-auto disabled for tests/CI to avoid bypassing multi-tenant bootstrap
#spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.database-platform=@spring.jpa.database-platform@
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.servlet.context-path=/api
spring.datasource.hikari.auto-commit=true

# Cloudflare Turnstile Configuration
# See https://developers.cloudflare.com/turnstile/get-started/ to enable turnstile.secret key and the protection to MS3 application
# cloudflare.turnstile.secret=<inserire_turnstile.secret_key>
cloudflare.turnstile.url=https://challenges.cloudflare.com/turnstile/v0/siteverify
# Two-factor authentication enforcement
# security.2fa.required-roles=CONFIGURATOR,PLANNER
security.2fa.master-key=change-me

# AI broker configuration
ai.broker.provider=GEMMA
# Se si vuole usare llama
# ai.broker.provider=LLAMA_70B
# Se si vuole usare gemma
# ai.broker.provider=GEMMA
ai.broker.gemma-url=https://generativelanguage.googleapis.com/v1beta/models/gemma-3-27b-it:generateContent
ai.broker.gemma-api-key=${GEMMA_API_KEY}
ai.broker.llama70b-url=https://api.groq.com/openai/v1/chat/completions
ai.broker.llama70b-api-key=${LLAMA_API_KEY}
ai.broker.llama70b-model=llama-3.3-70b-versatile
ai.broker.connect-timeout=5s
ai.broker.read-timeout=60s
# End-to-end timeout budget for the full retry flow (calls + waits).
# GEMMA 429 handling enforces a mandatory 60s sleep before retry, and that wait counts here.
# Keep this comfortably above 60s when retries are enabled to allow at least one 429 retry cycle.
ai.broker.total-timeout=900s
ai.broker.max-retries=3
ai.broker.retry-backoff=0ms
# AI rescheduling priority scale defaults (Story 3, Microtask 3.4)
ai.rescheduling.priority-scale.defaults.COVERAGE=0.35
ai.rescheduling.priority-scale.defaults.UFFA_BALANCE=0.25
ai.rescheduling.priority-scale.defaults.UP_DELTA=0.15
ai.rescheduling.priority-scale.defaults.VARIANCE_DELTA=0.25
