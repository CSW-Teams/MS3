# Configurazione per il database principale
spring.datasource.url=jdbc:postgresql://db:5432/${db.name}
spring.datasource.username=${db.user}
spring.datasource.password=${db.password}
spring.datasource.driverClassName=org.postgresql.Driver

# Configurazione tenant "public"
tenants-datasources.tenants.public.url=jdbc:postgresql://db:5432/${db.name}
tenants-datasources.tenants.public.username=${db.tenant.public.user}
tenants-datasources.tenants.public.password=${db.tenant.public.password}
tenants-datasources.tenants.public.driver=org.postgresql.Driver

# Configurazione tenant "a"
tenants-datasources.tenants.a.url=jdbc:postgresql://db:5432/${db.name}
tenants-datasources.tenants.a.username=${db.tenant.a.user}
tenants-datasources.tenants.a.password=${db.tenant.a.password}
tenants-datasources.tenants.a.driver=org.postgresql.Driver

# Configurazione tenant "b"
tenants-datasources.tenants.b.url=jdbc:postgresql://db:5432/${db.name}
tenants-datasources.tenants.b.username=${db.tenant.b.user}
tenants-datasources.tenants.b.password=${db.tenant.b.password}
tenants-datasources.tenants.b.driver=org.postgresql.Driver

# Impostazioni JPA
# Lo schema viene creato solo tramite SchemasInitializer (anche per le colonne 2FA);
# lasciare ddl-auto a "none" evita che Hibernate aggiri l'inizializzazione multi-tenant
# durante i test/CI.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configurazione di Spring
server.servlet.context-path=/api
spring.datasource.hikari.auto-commit=true

# AI broker configuration
ai.broker.provider=GEMMA
# Se si vuole usare llama
# ai.broker.provider=LLAMA_70B
# Se si vuole usare gemma
# ai.broker.provider=GEMMA
ai.broker.gemma-url=https://generativelanguage.googleapis.com/v1beta/models/gemma-3-27b-it:generateContent
ai.broker.gemma-api-key=${GEMMA_API_KEY}
ai.broker.llama70b-url=https://api.groq.com/openai/v1/chat/completions
ai.broker.llama70b-api-key=${LLAMA_API_KEY}
ai.broker.llama70b-model=llama-3.3-70b-versatile
ai.broker.connect-timeout=5s
ai.broker.read-timeout=900s
# End-to-end timeout budget for the full retry flow (calls + waits).
# GEMMA 429 handling enforces a mandatory 60s sleep before retry, and that wait counts here.
# Keep this comfortably above 60s when retries are enabled to allow at least one 429 retry cycle.
ai.broker.total-timeout=900s
ai.broker.max-retries=3
ai.broker.retry-backoff=0ms
ai.broker.schedule-validation-max-retries=2


# AI rescheduling priority scale defaults
ai.rescheduling.priority-scale.defaults.COVERAGE=0.35
ai.rescheduling.priority-scale.defaults.UFFA_BALANCE=0.25
ai.rescheduling.priority-scale.defaults.SENTIMENT_TRANSITIONS=0.15
ai.rescheduling.priority-scale.defaults.UP_DELTA=0.15
ai.rescheduling.priority-scale.defaults.VARIANCE_DELTA=0.10
